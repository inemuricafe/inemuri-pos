<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="INEMURI">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>INEMURI // SYS</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23000'/%3E%3Ctext x='50' y='72' font-size='66' text-anchor='middle' fill='%23fff' font-family='monospace'%3E%E2%96%88%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000; --fg:#f0f0f0; --dim:#7d7d7d;
    /* TODAS las líneas (marcos, divisores, líderes de puntos) al mismo tono y grosor (1px) */
    --dim2:#3a3a3a; --dot:#3a3a3a; --ln:#3a3a3a; --ln2:#3a3a3a;
    --retro:"VT323",ui-monospace,"SF Mono","Menlo",monospace;
    --head:"IBM Plex Mono",ui-monospace,"SF Mono","Menlo",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:#000;}
  body{font-family:var(--head);color:var(--fg);background:var(--bg);font-size:13.5px;line-height:1.5;
    letter-spacing:.4px;-webkit-font-smoothing:antialiased;min-height:100vh;}
  .up{text-transform:uppercase;}
  /* todos los textos del MISMO tamaño; la jerarquía es solo por PESO de la tipografía */
  #app, #app *{font-size:13px;}
  /* encabezados / chrome con un poco más de tracking */
  .tb b,.gtb,.hd,.ft,.st{letter-spacing:1.8px;}

  /* ── HEADER (franja superior con dither) ── */
  .hdr{position:relative;height:190px;border:1px solid var(--ln);overflow:hidden;background:#000;margin-bottom:10px;}
  /* fuerza B/N + que el motor de asc11 mida la franja del header (no 100vh) */
  .hdr [data-ascii-dither-bg]{filter:grayscale(1) contrast(1.05);height:100% !important;inset:0 !important;
    transform:scale(1.5);transform-origin:center;}  /* acerca la imagen para comer el negro de los lados */
  .hdr [data-ascii-dither-bg] canvas{max-height:100% !important;}
  .hdr-in{position:absolute;left:0;bottom:0;z-index:1;padding:12px 14px 13px;}
  .hdr .wm{font-size:30px;font-weight:700;letter-spacing:3px;line-height:1;text-shadow:0 1px 6px #000,0 0 2px #000;}
  .hdr .wm span{color:var(--dim);font-weight:500;}
  .hdr .wm-sub{font-size:11px;letter-spacing:3px;color:var(--dim);margin-top:7px;text-shadow:0 1px 4px #000;}
  .hdr .ctl{position:absolute;top:9px;right:10px;z-index:1;display:flex;gap:7px;}
  .hdr .ctl span{border:1px solid var(--ln2);width:18px;height:17px;display:flex;align-items:center;justify-content:center;
    font-size:11px;color:var(--fg);cursor:pointer;line-height:1;background:rgba(0,0,0,.45);font-family:var(--head);}
  .hdr .ctl span:active{background:var(--fg);color:#000;}

  .scr{position:relative;z-index:1;
    padding:max(10px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right))
            max(16px,env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left));
    max-width:480px;margin:0 auto;}

  /* ── GATE ── */
  #gate{position:fixed;inset:0;background:transparent;display:flex;align-items:center;justify-content:center;z-index:100;
    padding:max(16px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom));}
  #gate .box{border:1px solid var(--ln);width:100%;max-width:340px;background:rgba(0,0,0,.82);backdrop-filter:blur(2px);}
  #gate .gtb{border-bottom:1px solid var(--ln);padding:6px 9px;display:flex;justify-content:space-between;font-size:13px;letter-spacing:2px;}
  #gate .gtb .x{color:var(--dim);letter-spacing:3px;}
  #gate .gbody{padding:24px 18px;text-align:center;}
  #gate .ttl{font-family:var(--head);font-size:22px;letter-spacing:6px;font-weight:700;}
  #gate .sub{color:var(--dim);font-size:12px;letter-spacing:4px;margin:8px 0 24px;}
  #gate .ask{color:var(--dim);font-size:12px;letter-spacing:2px;margin-bottom:12px;}
  #gate input{background:#000;border:1px solid var(--ln2);color:var(--fg);font-family:var(--head);
    font-size:24px;text-align:center;letter-spacing:14px;width:200px;padding:11px 6px 11px 20px;outline:none;caret-color:var(--fg);}
  #gate input:focus{border-color:var(--ln);}
  #gate button{margin-top:18px;background:#000;color:var(--fg);border:1px solid var(--ln);font-family:var(--head);
    font-weight:600;font-size:14px;letter-spacing:4px;padding:11px 28px;cursor:pointer;width:200px;}
  #gate button:active{background:var(--fg);color:#000;}
  #gate .err{color:var(--fg);font-size:14px;letter-spacing:1px;height:16px;margin-top:14px;}

  /* ── WINDOW ── */
  .win{border:1px solid var(--ln);background:#000;}
  .tb{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--ln);padding:7px 10px;}
  .tb b{font-size:15px;letter-spacing:2.5px;font-weight:700;}
  .tb .ctl{display:flex;gap:7px;align-items:center;}
  .tb .ctl span{border:1px solid var(--ln2);width:17px;height:16px;display:flex;align-items:center;justify-content:center;
    font-size:11px;color:var(--dim);cursor:pointer;line-height:1;font-family:var(--head);}
  .tb .ctl span:active{background:var(--fg);color:#000;}

  .st{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--ln2);
    padding:6px 10px;font-size:12px;letter-spacing:1.5px;color:var(--dim);}
  .st .live{color:var(--fg);} .st .live.off{color:var(--dim);}

  .sec{padding:11px 10px 13px;border-top:1px solid var(--ln2);}
  .st + .sec{border-top:none;}  /* la línea bajo la fecha la pone el borde de .st; evita la doble línea */
  .hd{letter-spacing:2px;color:var(--fg);margin-bottom:9px;font-weight:700;}
  .ctrl{display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--ln2);padding:6px 10px;}
  .ctrl .lbl{color:var(--dim);letter-spacing:1.5px;margin-right:auto;}
  .ctrl button{background:transparent;border:1px solid var(--ln2);color:var(--fg);font-family:var(--head);letter-spacing:1px;padding:3px 9px;cursor:pointer;}
  .ctrl button:active{background:var(--fg);color:#000;}
  .ctrl #datepick{position:absolute;opacity:0;width:1px;height:1px;pointer-events:none;}

  .kv{display:flex;align-items:baseline;gap:7px;padding:1.5px 0;}
  .kv .k{white-space:nowrap;}
  .kv .k .t{color:var(--dim);margin-left:6px;font-size:12px;}
  .kv .dots{flex:1;border-bottom:1px dotted var(--dot);transform:translateY(-4px);min-width:10px;}
  .kv .v{white-space:nowrap;font-weight:600;}
  .kv .v.big{font-size:24px;line-height:1;letter-spacing:1px;font-weight:700;}
  .kv .tag{white-space:nowrap;color:var(--dim);font-size:12px;}
  .kv .tag.on{color:var(--fg);}

  .vr{padding:5px 0;border-top:1px dotted var(--dim2);}
  .vr:first-child{border-top:none;}
  .vr .res{color:var(--dim);font-size:12px;letter-spacing:.6px;margin-top:1px;padding-left:2px;
    text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .vr .fol{color:var(--fg);}
  .vr .v .m{color:var(--dim);font-size:11px;margin-left:5px;}
  .strike{text-decoration:line-through;opacity:.45;}

  .empty{color:var(--dim);font-size:13px;letter-spacing:1.5px;text-align:center;padding:14px 0;}

  .ft{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--ln);
    padding:8px 10px;font-size:11px;letter-spacing:1.5px;color:var(--dim);}
  .ft b{color:var(--fg);font-weight:700;}
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <div class="gtb"><span>INEMURI // ACCESO</span><span class="x">▢ ✕</span></div>
    <div class="gbody">
      <div class="ttl">INEMURI</div>
      <div class="sub up">SYS · NÁPOLES</div>
      <div class="ask up">&gt; Ingresa código</div>
      <input id="pin" type="tel" inputmode="numeric" maxlength="4" placeholder="····" autocomplete="off">
      <button id="pin-btn">ENTRAR</button>
      <div class="err up" id="pin-err"></div>
    </div>
  </div>
</div>

<div class="scr" id="app" style="display:none;">

  <header class="hdr">
    <div data-ascii-dither-bg aria-hidden="true" style="position:absolute;top:0;left:0;right:0;bottom:0;height:100%;z-index:0;pointer-events:none;overflow:hidden"></div>
    <script src="./ascii-dither-background.js"></script>
    <div class="hdr-in">
      <div class="wm">INEMURI</div>
    </div>
  </header>

  <div class="win">

    <div class="st">
      <span id="fecha" class="up">—</span>
      <span class="live" id="live"><span class="b">●</span> <span id="upd">CONECTANDO…</span></span>
    </div>

    <div class="ctrl">
      <span class="lbl up" id="ctrl-label"></span>
      <button id="btn-hoy" type="button" style="display:none;">[ HOY ]</button>
      <button id="btn-otrodia" type="button">[ OTRO DÍA ]</button>
      <input id="datepick" type="date" aria-label="Elegir fecha">
    </div>

    <div class="sec">
      <div class="hd" id="hd-ventas">[ VENTAS DE HOY ]</div>
      <div class="kv"><span class="k up">Total del día</span><span class="dots"></span><span class="v big">$<span id="total">0</span></span></div>
      <div class="kv"><span class="k up">Ventas</span><span class="dots"></span><span class="v" id="count">0</span></div>
      <div class="kv"><span class="k up">Efectivo</span><span class="dots"></span><span class="v">$<span id="ef">0</span></span></div>
      <div class="kv"><span class="k up">Tarjeta</span><span class="dots"></span><span class="v">$<span id="tar">0</span></span></div>
    </div>

    <div class="sec">
      <div class="hd" id="hd-turnos">[ EN TURNO ]</div>
      <div id="turnos"><div class="empty">—</div></div>
    </div>

    <div class="sec">
      <div class="hd">[ ÚLTIMAS VENTAS ]</div>
      <div id="ventas"><div class="empty">—</div></div>
    </div>

  </div>
</div>

<script>
// El fondo ASCII del header lo provee el export de asc11 (./ascii-dither-background.js),
// montado en <div data-ascii-dither-bg> dentro de .hdr. En B/N vía filter:grayscale.

// ════════ PANEL ════════
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbxG0Jrkng57AlB_Xfi8IL0rEPj0DXfa4oxVFa1ZY0-vt597CLZ_HlFF8ecDvMH84yusyA/exec';
const PANEL_PIN='8899';
const REFRESH_MS=30000;
const MAX_VENTAS=15;

const $=function(id){return document.getElementById(id);};
function entrar(){
  if($('pin').value===PANEL_PIN){ sessionStorage.setItem('inemuri_panel_ok','1'); abrirApp(); }
  else { $('pin-err').textContent='> CÓDIGO INCORRECTO'; $('pin').value=''; }
}
$('pin-btn').addEventListener('click',entrar);
$('pin').addEventListener('keydown',function(e){ if(e.key==='Enter')entrar(); });
$('pin').addEventListener('input',function(){ $('pin-err').textContent=''; if(this.value.length===4)entrar(); });
var _rl=$('reload'); if(_rl)_rl.addEventListener('click',cargar);

let _online=false, _cerrado=false, _modoHistorico=false;
function abrirApp(){
  $('gate').style.display='none'; $('app').style.display='block';
  cargar(); setInterval(cargar,REFRESH_MS);
  setInterval(function(){ if(_online && !_cerrado && !_modoHistorico){ var u=$('upd'); if(u) u.textContent='LIVE · '+hora(); } },1000); // reloj que avanza cada segundo
  wireOtroDia();
}
if(sessionStorage.getItem('inemuri_panel_ok')==='1'){ abrirApp(); }

function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
function fmt(n){ return (Math.round(n||0)).toLocaleString('es-MX'); }
function hora(){ return new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function setConn(ok,txt){ $('live').className='live'+(ok?'':' off'); $('upd').textContent=txt; $('live').querySelector('.b').textContent=ok?'●':'○'; }

async function cargar(){
  if(_modoHistorico) return;
  $('fecha').textContent=new Date().toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'});
  try{
    const r=await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'leer_sesion'})});
    const j=await r.json();
    _online=true;
    const s=(j&&j.sesion)?j.sesion:{};
    const hayVivo=(s.ventas&&s.ventas.lista&&s.ventas.lista.length)||(s.turnos&&Object.keys(s.turnos).length);
    if(hayVivo){ _cerrado=false; setConn(true,'LIVE · '+hora()); pintar(s); }
    else { await mostrarCerrado(); }
  }catch(e){ _online=false; _cerrado=false; setConn(false,'OFFLINE · REINTENTANDO'); }
}

// Sesión vacía (día cerrado o aún sin ventas): mostrar el total del último reporte de cierre
async function mostrarCerrado(){
  try{
    const r=await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'leer_reportes'})});
    const j=await r.json();
    const reps=j.reportes||[];
    const rep=reps.length?reps[reps.length-1]:null;
    // ¿el último reporte es de HOY? (si es de ayer, el día nuevo arranca en 0)
    let repISO='';
    if(rep && rep.fecha){
      const d=new Date(rep.fecha);
      if(!isNaN(d)) repISO=d.toLocaleDateString('en-CA');
      else { const m=String(rep.fecha).match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/); if(m){const yy=m[3].length===2?'20'+m[3]:m[3]; repISO=yy+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[1]).slice(-2);} }
    }
    const hoyISO=new Date().toLocaleDateString('en-CA');
    if(!rep || repISO!==hoyISO){ _cerrado=false; setConn(true,'LIVE · '+hora()); pintar({}); return; } // día nuevo / sin ventas hoy → 0
    _cerrado=true; setConn(true,'CERRADO · '+hora());
    const ef=parseFloat(rep.total_ventas_efectivo)||0, tar=parseFloat(rep.total_ventas_tarjeta)||0;
    $('total').textContent=fmt(ef+tar); $('count').textContent='—';
    $('ef').textContent=fmt(ef); $('tar').textContent=fmt(tar);
    $('turnos').innerHTML='<div class="empty">DÍA CERRADO</div>';
    $('ventas').innerHTML='<div class="empty">CIERRE HECHO — DETALLE EN EL REPORTE</div>';
  }catch(e){ _cerrado=false; setConn(true,'LIVE · '+hora()); pintar({}); }
}

// ── CONSULTAR OTRO DÍA (reportes de cierre anteriores) ──
function repToISO(f){
  if(!f) return '';
  const d=new Date(f);
  if(!isNaN(d)) return d.toLocaleDateString('en-CA');
  const m=String(f).match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m){ const yy=m[3].length===2?'20'+m[3]:m[3]; return yy+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[1]).slice(-2); }
  return '';
}
function fmtFechaISO(iso){ const p=String(iso).split('-'); return p.length===3?(parseInt(p[2])+'/'+parseInt(p[1])+'/'+p[0]):iso; }
function wireOtroDia(){
  const dp=$('datepick'); if(!dp) return;
  try{ dp.max=new Date().toLocaleDateString('en-CA'); }catch(e){}
  $('btn-otrodia').addEventListener('click',function(){ try{ dp.showPicker(); }catch(e){ dp.focus(); dp.click(); } });
  dp.addEventListener('change',function(){ if(dp.value) mostrarDiaHistorico(dp.value); });
  $('btn-hoy').addEventListener('click',volverHoy);
}
async function mostrarDiaHistorico(iso){
  _modoHistorico=true; _cerrado=false;
  $('btn-hoy').style.display=''; $('btn-otrodia').style.display='none';
  $('ctrl-label').textContent='VIENDO '+fmtFechaISO(iso);
  $('hd-ventas').textContent='[ VENTAS DEL DÍA ]'; $('hd-turnos').textContent='[ CIERRE ]';
  setConn(true,'HISTÓRICO');
  try{
    const r=await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'leer_reportes'})});
    const j=await r.json();
    const rep=(j.reportes||[]).find(function(x){ return repToISO(x.fecha)===iso; });
    if(!rep){
      $('total').textContent='0'; $('count').textContent='—'; $('ef').textContent='0'; $('tar').textContent='0';
      $('turnos').innerHTML='<div class="empty">SIN REPORTE DE ESE DÍA</div>';
      $('ventas').innerHTML='<div class="empty">NO HUBO CIERRE REGISTRADO</div>';
      return;
    }
    const ef=parseFloat(rep.total_ventas_efectivo)||0, tar=parseFloat(rep.total_ventas_tarjeta)||0;
    $('total').textContent=fmt(ef+tar); $('count').textContent='—';
    $('ef').textContent=fmt(ef); $('tar').textContent=fmt(tar);
    $('turnos').innerHTML='<div class="kv"><span class="k up">Cerró</span><span class="dots"></span><span class="v">'+esc(rep.barista_cierre||'—')+'</span></div>'
      +'<div class="kv"><span class="k up">Tareas</span><span class="dots"></span><span class="v">'+esc(String(rep.tareas_completadas||0))+'/'+esc(String(rep.tareas_total||0))+'</span></div>';
    $('ventas').innerHTML='<div class="empty">SOLO TOTALES DEL CIERRE · DETALLE EN EL REPORTE</div>';
  }catch(e){ setConn(false,'OFFLINE'); }
}
function volverHoy(){
  _modoHistorico=false;
  $('btn-hoy').style.display='none'; $('btn-otrodia').style.display='';
  $('ctrl-label').textContent=''; $('hd-ventas').textContent='[ VENTAS DE HOY ]'; $('hd-turnos').textContent='[ EN TURNO ]';
  const dp=$('datepick'); if(dp) dp.value='';
  cargar();
}

function pintar(s){
  const lista=(s.ventas&&s.ventas.lista)?s.ventas.lista:[];
  const vig=lista.filter(function(v){return !v.cancelada && !v.corregida;});
  const total=vig.reduce(function(a,v){return a+(v.total||0);},0);
  const ef=vig.filter(function(v){return v.metodo==='efectivo';}).reduce(function(a,v){return a+(v.total||0);},0);
  const tar=vig.filter(function(v){return v.metodo==='tarjeta';}).reduce(function(a,v){return a+(v.total||0);},0);
  $('total').textContent=fmt(total); $('count').textContent=vig.length;
  $('ef').textContent=fmt(ef); $('tar').textContent=fmt(tar);

  const turnos=s.turnos||{}, nombres=Object.keys(turnos);
  if(!nombres.length){ $('turnos').innerHTML='<div class="empty">NADIE EN TURNO</div>'; }
  else{
    $('turnos').innerHTML=nombres.map(function(n){
      const t=turnos[n]||{}; let txt='ACTIVO', on=true;
      if(t.salida){ txt='SALIÓ'; on=false; }
      else if(t.salidaComer && !t.regresoComer){ txt='COMIDA'; on=false; }
      return '<div class="kv"><span class="k up">'+esc(String(n))+(t.entrada?'<span class="t">'+esc(t.entrada)+'</span>':'')+'</span>'
        +'<span class="dots"></span><span class="tag'+(on?' on':'')+'">['+txt+']</span></div>';
    }).join('');
  }

  if(!lista.length){ $('ventas').innerHTML='<div class="empty">SIN VENTAS HOY</div>'; return; }
  const rec=lista.slice().reverse().filter(function(v){return !v.corregida;}).slice(0,MAX_VENTAS);
  $('ventas').innerHTML=rec.map(function(v){
    const m=v.metodo||'efectivo';
    const code=m==='tarjeta'?'TAR':m==='promo'?'PRM':'EF';
    const flags=(v.esCorreccionDe?' COR':'')+(v.cancelada?' CANC':'');
    const sk=v.cancelada?' strike':'';
    return '<div class="vr"><div class="kv">'
      +'<span class="k"><span class="fol">'+esc(v.folio)+'</span> '+esc(String(v.barista||'').toUpperCase())+'</span>'
      +'<span class="dots"></span>'
      +'<span class="v'+sk+'">$'+fmt(v.total)+'<span class="m">['+code+flags+']</span></span></div>'
      +'<div class="res'+sk+'">'+esc(v.resumen||'')+'</div></div>';
  }).join('');
}
</script>
</body>
</html>
